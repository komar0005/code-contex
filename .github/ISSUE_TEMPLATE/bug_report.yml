name: Bug report
description: Something is broken or renders wrong
labels: [bug]
body:
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g. Arch Linux + Hyprland / Windows 11 / macOS 15"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you see instead? Screenshots welcome.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Terminal output
      description: If you can, run the app from a terminal and paste any errors.
      render: text
